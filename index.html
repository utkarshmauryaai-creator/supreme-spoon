<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satyendra Maurya | Official Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #131c31;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .portfolio-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 24px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            overflow: hidden;
            background: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .info-section {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .info-item {
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .label {
            color: var(--text-muted);
            font-weight: 500;
            display: inline-block;
            width: 100px;
        }

        .value {
            color: var(--text-main);
            font-weight: 600;
        }

        .footer-tag {
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <!-- Profile Image Section -->
        <div class="profile-img-container">
            <!-- अपनी फोटो का नाम यहाँ बदलें (e.g., my-pic.jpg) -->
            <img src="profile.jpg" alt="Satyendra Maurya">
        </div>

        <!-- Identity -->
        <h1>Satyendra Maurya</h1>
        <div class="subtitle">Founder, Utkarsh Quantum Solver</div>

        <!-- Personal Details Box -->
        <div class="info-section">
            <div class="info-item">
                <span class="label">Stream:</span>
                <span class="value">Science & Technology</span>
            </div>
            <div class="info-item">
                <span class="label">Specialization:</span>
                <span class="value">Algorithms & Chess Tactics</span>
            </div>
            <div class="info-item">
                <span class="label">Status:</span>
                <span class="value">Verified Official Profile</span>
            </div>
        </div>

        <!-- Professional Footer -->
        <div class="footer-tag">
            &copy; 2026 Utkarsh Quantum Solver. All Rights Reserved.
        </div>
    </div>

</body>
</html>
